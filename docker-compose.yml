services:
  api:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: netsuite-proxy-api
    ports:
      - "8085:8000"
    env_file:
      - ./python/.env
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - netsuite-network

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    restart: unless-stopped
    command: tunnel --url http://api:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - netsuite-network

networks:
  netsuite-network:
    driver: bridge
